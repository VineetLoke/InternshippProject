name: focus_lock
description: FocusLock – Android App to Block Instagram, Reddit, and Twitter/X with Delayed Unlock & Physical Challenge
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.0.0
  pedometer_2: ^5.0.4
  intl: ^0.19.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  http: ^1.1.0
  google_mlkit_pose_detection: ^0.14.0
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
